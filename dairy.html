<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dairy.css">
    <title>Dairy products</title>
</head>
<body>
    <h1>Dairy Products</h1>
    <img id="cowlogo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRVp2nK__YVhoHfQ9CsSoDMG_HgkIf3rSg4Rw&s">
    <div id="productsContainer">
    <div id="milkinfo" class="productblock">
    <img id="milk" src="https://media.istockphoto.com/id/1209025091/photo/fresh-milk.jpg?s=612x612&w=0&k=20&c=FiZ8tM_UmthTlIoeDuVSWNh6ib5NBzkWH5rvY6gE4KM=">
    <button id="milknameinfo" class="productname">add to cart</button>
    </div>

    <div id="yogurtinfo" class="productblock">
       <img id="yogurt" class="productimg" src="bowl-yogurt.webp">
    <button id="yogurtname" class="productname">add to cart</button>
    </div>

    <div id="butterinfo" class="productblock">
        <img id="butter" class="productimg" src="butter.jpg">
    <button id="buttername" class="productname">add to cart</button>
    </div>

    <div id="cheeseinfo" class="productblock">
        <img id="cheese" class="productimg" src="cheese.webp">
    <button id="cheesename" class="productname">add to cart</button>
    </div>
    </div>
    <button id="cartbutton">
    <img id="cartlogo" src="cart.webp" alt="Cart">
    </button>
    <p id="addtocart">Cart</p>

    <!-- Custom Alert Modal -->
    <div id="customAlert" class="modal">
        <div class="modal-content">
            <p id="alertMessage"></p>
            <button id="closeAlert" class="close-btn">OK</button>
        </div>
    </div>
    <h1 id="free">
        FREE OF COST
    </h1>

    <script src="dairy.js"></script>
</body>
</html>
